<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Wallet Auth 钱包登录示例</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        background: #ffffff;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 12px 32px rgb(25 35 55 / 8%);
      }

      h1 {
        margin: 0 0 20px;
        font-size: 24px;
        line-height: 1.2;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c9d1de;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
        background: #ffffff;
        color: inherit;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      button {
        margin-top: 16px;
        border: 0;
        border-radius: 6px;
        padding: 11px 16px;
        background: #125fca;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      pre {
        overflow: auto;
        border-radius: 6px;
        background: #111827;
        color: #dbeafe;
        padding: 14px;
        min-height: 80px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111827;
          color: #f8fafc;
        }

        main {
          background: #172033;
          border-color: #2b3548;
        }

        input,
        textarea {
          background: #111827;
          border-color: #334155;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Open Wallet Auth 钱包登录示例</h1>

      <label>
        认证服务地址
        <input id="authBaseURL" value="http://localhost:8080" />
      </label>

      <label>
        业务系统 Client ID
        <input id="clientID" value="default" />
      </label>

      <label>
        链 ID
        <input id="chainID" value="1" inputmode="numeric" />
      </label>

      <button id="loginButton">连接钱包</button>

      <label>
        待签名消息
        <textarea id="message" readonly></textarea>
      </label>

      <label>
        结果
        <pre id="result">等待钱包登录。</pre>
      </label>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      function writeResult(value) {
        $("result").textContent =
          typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      async function postJSON(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const payload = await response.json();
        if (!response.ok || payload.code !== "OK") {
          throw new Error(payload.message || `请求失败：${response.status}`);
        }
        return payload.data;
      }

      async function walletLogin() {
        if (!window.ethereum) {
          throw new Error("未检测到 EIP-1193 钱包，请安装 MetaMask 或其他浏览器钱包。");
        }

        const authBaseURL = $("authBaseURL").value.replace(/\/$/, "");
        const clientID = $("clientID").value.trim() || "default";
        const chainID = Number($("chainID").value || 1);
        const [address] = await window.ethereum.request({
          method: "eth_requestAccounts",
        });

        const nonceData = await postJSON(`${authBaseURL}/api/v1/wallet/nonce`, {
          address,
          domain: window.location.host || "localhost",
          chain_id: chainID,
        });
        $("message").value = nonceData.message;

        const signature = await window.ethereum.request({
          method: "personal_sign",
          params: [nonceData.message, address],
        });

        const loginData = await postJSON(`${authBaseURL}/api/v1/wallet/verify`, {
          client_id: clientID,
          address,
          nonce: nonceData.nonce,
          signature,
        });

        localStorage.setItem("owa_access_token", loginData.token.access_token);
        localStorage.setItem("owa_refresh_token", loginData.token.refresh_token);
        writeResult(loginData);
      }

      $("loginButton").addEventListener("click", async () => {
        $("loginButton").disabled = true;
        writeResult("正在连接钱包...");
        try {
          await walletLogin();
        } catch (error) {
          writeResult(error.message);
        } finally {
          $("loginButton").disabled = false;
        }
      });
    </script>
  </body>
</html>
