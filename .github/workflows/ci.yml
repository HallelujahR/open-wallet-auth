name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go fmt
        run: test -z "$(gofmt -l .)"

      - name: Go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Docker build
        run: docker build -t open-wallet-auth:ci .
