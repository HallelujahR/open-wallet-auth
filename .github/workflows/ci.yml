name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go fmt
        run: test -z "$(gofmt -l .)"

      - name: Go vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Unit tests
        run: CGO_ENABLED=0 go test ./... -coverprofile=coverage.out

      - name: Race tests
        run: CGO_ENABLED=1 go test ./... -race

      - name: Docker build
        run: docker build -t open-wallet-auth:ci .
