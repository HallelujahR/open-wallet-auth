name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22.x", "1.24.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Go fmt
        run: test -z "$(gofmt -l .)"

      - name: Go vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2024.1.1
          staticcheck ./...

      - name: Unit tests
        run: CGO_ENABLED=0 go test ./... -coverprofile=coverage.out

      - name: Race tests
        if: matrix.go-version == '1.24.x'
        run: CGO_ENABLED=1 go test ./... -race

      - name: Docker build
        if: matrix.go-version == '1.24.x'
        run: docker build -t open-wallet-auth:ci .
