app:
  name: open-wallet-auth
  env: development

http:
  host: 0.0.0.0
  port: 8080
  read_header_timeout: 5s
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  cors_allowed_origins:
    - http://localhost:3000
    - http://localhost:5173
    - "null"

log:
  level: info
  format: console

database:
  driver: postgres
  dsn: postgres://open_wallet_auth:open_wallet_auth@localhost:5432/open_wallet_auth?sslmode=disable
  auto_migrate: true
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 30m

redis:
  enabled: false
  addr: localhost:6379
  password: ""
  db: 0

jwt:
  issuer: open-wallet-auth
  access_token_ttl: 15m
  refresh_token_ttl: 720h
  private_key_path: ./configs/jwt_private.pem
  public_key_path: ./configs/jwt_public.pem
  active_key_id: default

wallet:
  nonce_ttl: 5m

phone:
  enabled: true
  # memory keeps local setup simple; set to redis for shared deployments.
  code_store: memory
  code_ttl: 5m
  dev_code: "123456"
  expose_dev_code: true
  rate_limit_enabled: true
  send_limit: 3
  send_window: 1m
  verify_limit: 5
  verify_window: 5m
  provider:
    type: noop
    webhook:
      url: ""
      bearer_token: ""
    aliyun_sms:
      access_key_id: ""
      access_key_secret: ""
      sign_name: ""
      template_code: ""
      region_id: cn-hangzhou
      endpoint: https://dysmsapi.aliyuncs.com
    headers: {}

email:
  verification_enabled: true
  # memory keeps local setup simple; set to redis for shared deployments.
  code_store: memory
  code_ttl: 15m
  dev_code: "123456"
  expose_dev_code: true
  rate_limit_enabled: true
  send_limit: 3
  send_window: 1m
  verify_limit: 5
  verify_window: 5m
  provider:
    type: noop
    webhook:
      url: ""
      bearer_token: ""
    smtp:
      host: ""
      port: 587
      username: ""
      password: ""
      from: ""
    headers: {}

oauth:
  state_ttl: 10m
  google:
    client_id: ""
    client_secret: ""
    auth_url: https://accounts.google.com/o/oauth2/v2/auth
    token_url: https://oauth2.googleapis.com/token
    user_info_url: https://openidconnect.googleapis.com/v1/userinfo
    scopes:
      - openid
      - email
      - profile
  github:
    client_id: ""
    client_secret: ""
    auth_url: https://github.com/login/oauth/authorize
    token_url: https://github.com/login/oauth/access_token
    user_info_url: https://api.github.com/user
    scopes:
      - read:user
      - user:email

management:
  admin_token: dev-admin-token
