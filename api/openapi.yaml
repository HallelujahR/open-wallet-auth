openapi: 3.0.3
info:
  title: Open Wallet Auth API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Ready
  /api/v1/auth/register:
    post:
      summary: Register with email and password
      responses:
        "200":
          description: Registered
  /api/v1/auth/login:
    post:
      summary: Login with email and password
      responses:
        "200":
          description: Logged in
  /api/v1/auth/refresh:
    post:
      summary: Rotate refresh token and issue a new token pair
      responses:
        "200":
          description: Refreshed
  /api/v1/auth/logout:
    post:
      summary: Revoke a refresh token
      responses:
        "200":
          description: Logged out
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
  /api/v1/auth/password:
    patch:
      summary: Change the current authenticated user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
  /api/v1/auth/password/reset:
    post:
      summary: Reset a password with an email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
  /api/v1/auth/bind/email:
    post:
      summary: Bind an email to the current authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindEmailRequest"
      responses:
        "200":
          description: Email bound
        "409":
          description: Email already bound to another user
  /api/v1/auth/bind/phone:
    post:
      summary: Bind a phone number to the current authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindPhoneRequest"
      responses:
        "200":
          description: Phone bound
        "409":
          description: Phone already bound to another user
  /api/v1/wallet/nonce:
    post:
      summary: Create a SIWE-compatible wallet login challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletNonceRequest"
      responses:
        "200":
          description: Wallet nonce and message
  /api/v1/wallet/verify:
    post:
      summary: Verify a wallet signature and issue a token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletVerifyRequest"
      responses:
        "200":
          description: Logged in with wallet
  /api/v1/wallet/bind:
    post:
      summary: Bind a verified wallet address to the current authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletBindRequest"
      responses:
        "200":
          description: Wallet bound
        "409":
          description: Wallet already bound to another user
  /api/v1/phone/code:
    post:
      summary: Create a phone verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneCodeRequest"
      responses:
        "200":
          description: Phone code created
  /api/v1/phone/login:
    post:
      summary: Verify phone code and issue a token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneLoginRequest"
      responses:
        "200":
          description: Logged in with phone
  /api/v1/email/code:
    post:
      summary: Create an email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailCodeRequest"
      responses:
        "200":
          description: Email code created
  /api/v1/email/verify:
    post:
      summary: Verify an email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailVerifyRequest"
      responses:
        "200":
          description: Email verified
  /api/v1/oauth/{provider}/start:
    get:
      summary: Create a provider OAuth authorization URL
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
        - name: client_id
          in: query
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth authorization URL
  /api/v1/oauth/{provider}/bind/start:
    get:
      summary: Create a provider OAuth authorization URL for account binding
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
        - name: client_id
          in: query
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth authorization URL for binding
        "409":
          description: OAuth account already bound to another user
  /api/v1/oauth/{provider}/callback:
    get:
      summary: Complete provider OAuth login
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Logged in with OAuth provider
  /.well-known/jwks.json:
    get:
      summary: JSON Web Key Set
      responses:
        "200":
          description: Public signing keys
  /api/v1/clients:
    get:
      summary: List application clients
      responses:
        "200":
          description: Client list
    post:
      summary: Create an application client
      responses:
        "200":
          description: Created client
  /api/v1/admin/users:
    get:
      summary: List identity users for internal management
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, deleted]
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Identity user list
  /api/v1/admin/users/{user_id}:
    get:
      summary: Get one identity user with login systems and bindings
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Identity user detail
  /api/v1/admin/users/{user_id}/status:
    patch:
      summary: Update identity user status
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserStatusRequest"
      responses:
        "200":
          description: Status updated
  /api/v1/admin/users/{user_id}/sessions:
    delete:
      summary: Revoke all refresh-token sessions for one identity user
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: client_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: User sessions revoked
  /api/v1/admin/users/{user_id}/wallets/{wallet_id}:
    delete:
      summary: Unbind one wallet from an identity user
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: wallet_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet unbound
  /api/v1/admin/users/{user_id}/oauth-accounts/{account_id}:
    delete:
      summary: Unbind one OAuth account from an identity user
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth account unbound
  /api/v1/admin/sessions:
    get:
      summary: List refresh-token sessions for internal management
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
        - name: client_id
          in: query
          schema:
            type: string
        - name: active_only
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Token session list
  /api/v1/admin/sessions/{session_id}:
    delete:
      summary: Revoke one refresh-token session
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session revoked
  /api/v1/admin/login-logs:
    get:
      summary: List login audit logs for internal management
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
        - name: client_id
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Login audit log list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
    ResetPasswordRequest:
      type: object
      required:
        - email
        - code
        - new_password
      properties:
        email:
          type: string
          format: email
        code:
          type: string
        new_password:
          type: string
          minLength: 8
    BindEmailRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
        code:
          type: string
    BindPhoneRequest:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
        code:
          type: string
    WalletNonceRequest:
      type: object
      required:
        - address
        - domain
      properties:
        address:
          type: string
        domain:
          type: string
        chain_id:
          type: integer
          format: int64
    WalletVerifyRequest:
      type: object
      required:
        - address
        - nonce
        - signature
      properties:
        client_id:
          type: string
        address:
          type: string
        nonce:
          type: string
        signature:
          type: string
    WalletBindRequest:
      type: object
      required:
        - address
        - nonce
        - signature
      properties:
        address:
          type: string
        nonce:
          type: string
        signature:
          type: string
    PhoneCodeRequest:
      type: object
      required:
        - phone
      properties:
        client_id:
          type: string
        phone:
          type: string
    PhoneLoginRequest:
      type: object
      required:
        - phone
        - code
      properties:
        client_id:
          type: string
        phone:
          type: string
        code:
          type: string
    EmailCodeRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    EmailVerifyRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
        code:
          type: string
    AdminUpdateUserStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [active, suspended, deleted]
