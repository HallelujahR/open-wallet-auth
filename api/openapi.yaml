openapi: 3.0.3
info:
  title: Open Wallet Auth API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Ready
  /api/v1/auth/register:
    post:
      summary: Register with email and password
      responses:
        "200":
          description: Registered
  /api/v1/auth/login:
    post:
      summary: Login with email and password
      responses:
        "200":
          description: Logged in
  /api/v1/auth/refresh:
    post:
      summary: Rotate refresh token and issue a new token pair
      responses:
        "200":
          description: Refreshed
  /api/v1/auth/logout:
    post:
      summary: Revoke a refresh token
      responses:
        "200":
          description: Logged out
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
  /api/v1/wallet/nonce:
    post:
      summary: Create a SIWE-compatible wallet login challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletNonceRequest"
      responses:
        "200":
          description: Wallet nonce and message
  /api/v1/wallet/verify:
    post:
      summary: Verify a wallet signature and issue a token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletVerifyRequest"
      responses:
        "200":
          description: Logged in with wallet
  /.well-known/jwks.json:
    get:
      summary: JSON Web Key Set
      responses:
        "200":
          description: Public signing keys
  /api/v1/clients:
    get:
      summary: List application clients
      responses:
        "200":
          description: Client list
    post:
      summary: Create an application client
      responses:
        "200":
          description: Created client
components:
  schemas:
    WalletNonceRequest:
      type: object
      required:
        - address
        - domain
      properties:
        address:
          type: string
        domain:
          type: string
        chain_id:
          type: integer
          format: int64
    WalletVerifyRequest:
      type: object
      required:
        - address
        - nonce
        - signature
      properties:
        client_id:
          type: string
        address:
          type: string
        nonce:
          type: string
        signature:
          type: string
